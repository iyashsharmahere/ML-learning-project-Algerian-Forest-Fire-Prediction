<!DOCTYPE html>
<html>
<head>
    <title>Prediction Form</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    
    .login {
        background: white;
        border-radius: 12px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        padding: 50px 40px;
        max-width: 500px;
        width: 100%;
    }
    
    h1 {
        color: #333;
        margin-bottom: 30px;
        text-align: center;
        font-size: 32px;
        font-weight: 600;
    }
    
    form {
        display: flex;
        flex-direction: column;
        gap: 15px;
        margin-bottom: 30px;
    }
    
    input {
        padding: 14px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s ease;
        background-color: #f9f9f9;
    }
    
    input:focus {
        outline: none;
        border-color: #0a0b10;
        background-color: white;
        box-shadow: 0 0 8px rgba(102, 126, 234, 0.2);
    }
    
    input::placeholder {
        color: #999;
    }
    
    button {
        padding: 14px 24px;
        background: linear-gradient(135deg, #27292e 0%, #200937 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
    }
    
    button:active {
        transform: translateY(0);
    }
    
    h2 {
        color: #333;
        text-align: center;
        font-size: 18px;
        font-weight: 500;
        padding: 20px;
        background: linear-gradient(135deg, #f0f4ff 0%, #f8f5ff 100%);
        border-radius: 8px;
    }
    
    @media (max-width: 600px) {
        .login {
            padding: 30px 20px;
        }
        
        h1 {
            font-size: 24px;
        }
        
        input {
            padding: 12px 14px;
            font-size: 14px;
        }
    }
</style>
<body>
    <div class="login">
        <h1>FWI Prediction</h1>
        <form action="{{url_for('predict_datapoint')}}" method="post">
            <input type="text" name="Temperature" placeholder="Temperature" required /><br>
            <input type="text" name="RH" placeholder="Relative Humidity" required /><br>
            <input type="text" name="WS" placeholder="Wind Speed" required /><br>
            <input type="text" name="Rain" placeholder="Rain" required /><br>
            <input type="text" name="FFMC" placeholder="FFMC" required /><br>
            <input type="text" name="DMC" placeholder="DMC" required /><br>
            <input type="text" name="ISI" placeholder="ISI" required /><br>
            <input type="text" name="Classes" placeholder="Classes" required /><br>
            <input type="text" name="region" placeholder="region" required /><br>
            
            <button type="submit" class="btn btn-primary btn-block btn-large">Predict</button>
        </form>
        <h2>
            The FWI prediction is {{results}}
        </h2>
    </div>
</body>
</html>
